<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITS.Vermeer Studio – Web DAW</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --bg: #101216;
      --panel: #171b22;
      --panel2: #1d232d;
      --line: #2a3240;
      --text: #e8edf6;
      --muted: #9aa6bb;
      --accent: #ff9f1c;
      --accent2: #4cc9f0;
      --good: #34d399;
      --bad: #fb7185;
      --step: #263244;
      --stepOn: #ff9f1c;
      --stepPlay: #ffd166;
      --shadow: 0 12px 30px rgba(0, 0, 0, .35);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: linear-gradient(180deg, #0d1015, #11151b 45%, #0b0d12);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    button, input, select { font: inherit; }
    .app { display: grid; grid-template-rows: 64px 1fr; height: 100vh; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: rgba(14, 18, 24, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }
    .logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: radial-gradient(circle at 30% 30%, #fff, #ffb84d 22%, #f97316 45%, #8a2be2 100%);
      box-shadow: 0 0 28px rgba(255, 159, 28, .35);
    }
    .brand small { display: block; color: var(--muted); font-weight: 600; }
    .top-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn, .tab {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #232b38, #1a202a);
      color: var(--text);
      border-radius: 12px;
      padding: 9px 12px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: 0.15s;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
    }
    .btn:hover, .tab:hover { transform: translateY(-1px); border-color: #3d4b60; }
    .btn.primary { background: linear-gradient(180deg, #ffb84d, #f97316); color: #1c1306; font-weight: 800; border-color: #ff9f1c; }
    .btn.danger { background: linear-gradient(180deg, #ff6b81, #e11d48); color: white; }
    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: #141923;
      border-radius: 999px;
      padding: 7px 10px;
      min-width: 120px;
      box-shadow: var(--shadow);
    }
    .pill label { color: var(--muted); font-size: 12px; }
    .pill input[type=range] { width: 80px; accent-color: #ff9f1c; }
    .pill select { background: #1a202a; color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 4px 8px; }
    .pill b { min-width: 32px; text-align: center; }
    .main {
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }
    .panel {
      background: linear-gradient(180deg, rgba(25, 30, 39, .94), rgba(18, 22, 29, .96));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, .02);
      font-weight: 600;
    }
    .sidebar { display: grid; grid-template-rows: auto 1fr auto; }
    .browser { padding: 12px; overflow-y: auto; flex: 1; }
    .browser .item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 10px;
      background: #161b24;
      cursor: pointer;
    }
    .browser .item:hover { border-color: #ff9f1c; }
    .sidebar-foot { padding: 12px; border-top: 1px solid var(--line); display: grid; gap: 8px; }
    .small-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .content { display: grid; grid-template-rows: auto 1fr; gap: 12px; min-width: 0; min-height: 0; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab.active { border-color: #ff9f1c; background: linear-gradient(180deg, #303445, #232836); }
    .workspace { flex: 1; overflow: hidden; }
    .view { display: none; flex-direction: column; height: 100%; }
    .view.active { display: flex; }
    .rack { overflow-y: auto; padding: 12px; flex: 1; display: grid; gap: 10px; }
    .channel {
      display: grid;
      grid-template-columns: 200px 1fr 130px;
      gap: 10px;
      background: #141923;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }
    .steps { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; }
    .step {
      aspect-ratio: 1;
      background: var(--step);
      border-radius: 6px;
      border: 1px solid #364355;
      cursor: pointer;
    }
    .step.on { background: linear-gradient(180deg, #ffb84d, #f97316); border-color: #ffd166; }
    .step.playing { outline: 2px solid var(--stepPlay); }
    .playlist { padding: 12px; overflow-y: auto; flex: 1; }
    .clip {
      background: #1e2530;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clip.audio { background: #1d3a40; }
    .piano-wrap { padding: 12px; flex: 1; overflow: auto; }
    .piano-canvas {
      position: relative;
      min-width: 900px;
      height: 400px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #0f1319;
      margin-top: 8px;
    }
    .keys { position: absolute; left: 0; top: 0; width: 80px; bottom: 0; background: #11161d; border-right: 1px solid var(--line); }
    .key { height: 25px; border-bottom: 1px solid rgba(255,255,255,.05); display: flex; align-items: center; padding-left: 6px; font-size: 10px; color: #cfd7e6; }
    .pgrid {
      position: absolute;
      left: 80px;
      top: 0;
      right: 0;
      bottom: 0;
      background-image: linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 40px 1px, 1px 25px;
    }
    .note {
      position: absolute;
      height: 22px;
      border-radius: 4px;
      background: var(--good);
      border: 1px solid white;
      cursor: pointer;
      font-size: 9px;
      display: flex;
      align-items: center;
      padding: 0 4px;
    }
    .mixer { padding: 12px; overflow-x: auto; display: flex; gap: 8px; }
    .strip {
      width: 80px;
      background: #12171f;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .meter { width: 14px; height: 120px; background: #0b0f14; border-radius: 999px; position: relative; overflow: hidden; }
    .meter span { position: absolute; left: 0; bottom: 0; width: 100%; background: linear-gradient(180deg, #34d399, #f59e0b, #ef4444); border-radius: 999px; transition: height .06s; }
    .fader { writing-mode: bt-lr; appearance: slider-vertical; width: 18px; height: 120px; accent-color: #ff9f1c; }
    .right-panel .panel-body { padding: 12px; overflow-y: auto; flex: 1; display: grid; gap: 10px; }
    .audio-manager { padding: 12px; overflow-y: auto; }
    .audio-item { padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: #1a1f2b; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1a202a; padding: 24px; border-radius: 20px; border: 1px solid var(--line); min-width: 320px; }
    @media (max-width: 1100px) { .main { grid-template-columns: 240px 1fr; } .right-panel { display: none; } }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="logo"></div><div>ITS.Vermeer Studio<small>Web DAW</small></div></div>
    <div class="top-controls">
      <button class="btn primary" id="playBtn">▶ Play</button>
      <button class="btn" id="stopBtn">■ Stop</button>
      <div class="pill"><label>BPM</label><input id="bpm" type="range" min="60" max="180" value="128"><b id="bpmVal">128</b></div>
      <div class="pill"><label>Bars</label><select id="bars"><option>1</option><option selected>2</option><option>4</option><option>8</option></select></div>
      <button class="btn" id="addChannelBtn">+ Channel</button>
      <button class="btn" id="exportBtn">📥 Export</button>
      <button class="btn" id="saveBtn">💾 Save</button>
      <button class="btn" id="loadBtn">📂 Load</button>
      <button class="btn danger" id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <div class="main">
    <!-- Left Sidebar: Browser + Audio Manager -->
    <aside class="panel sidebar">
      <div class="panel-head">Browser</div>
      <div class="browser" id="browser">
        <div class="item" data-type="channel" data-name="Kick"><b>🥁 Kick</b></div>
        <div class="item" data-type="channel" data-name="Snare"><b>🥁 Snare</b></div>
        <div class="item" data-type="channel" data-name="Hi-Hat"><b>🥁 Hi-Hat</b></div>
        <div class="item" data-type="channel" data-name="Bass"><b>🎸 Bass</b></div>
        <div class="item" data-type="channel" data-name="Lead"><b>🎹 Lead</b></div>
      </div>
      <div style="padding:12px; border-top:1px solid var(--line);">
        <div style="font-weight:600; margin-bottom:8px;">🎵 Imported Audio</div>
        <div class="audio-manager" id="audioManager">
          <div style="color:var(--muted); font-size:12px;">No audio imported</div>
        </div>
      </div>
      <div class="sidebar-foot">
        <div class="small-grid">
          <button class="btn" id="addPatternBtn">+ Pattern Clip</button>
          <button class="btn" id="importAudioBtn">📁 Import Audio</button>
        </div>
        <button class="btn" id="importMidiBtn" style="width:100%;">📥 MIDI Import</button>
        <input type="file" id="audioFileInput" accept="audio/*" style="display:none" />
        <input type="file" id="midiFileInput" accept=".mid,.midi" style="display:none" />
      </div>
    </aside>

    <!-- Center Workspace -->
    <section class="content">
      <div class="tabs">
        <button class="tab active" data-view="rackView">Channel Rack</button>
        <button class="tab" data-view="playlistView">Playlist</button>
        <button class="tab" data-view="pianoView">Piano Roll</button>
        <button class="tab" data-view="mixerView">Mixer</button>
      </div>
      <div class="workspace panel">
        <div class="view rack-view active" id="rackView">
          <div class="panel-head">Step Sequencer <b id="playInfo">--:--</b></div>
          <div class="rack" id="rack"></div>
        </div>
        <div class="view playlist-view" id="playlistView">
          <div class="panel-head">Playlist <b id="clipCount">0 clips</b></div>
          <div class="playlist" id="playlistContainer"></div>
        </div>
        <div class="view piano-view" id="pianoView">
          <div class="panel-head">Piano Roll <b id="selectedChannelLabel">Kick</b></div>
          <div class="piano-wrap">
            <div style="display:flex; gap:10px; margin-bottom:8px;">
              <button class="btn" id="clearNotesBtn">Clear Notes</button>
              <button class="btn" id="quantizeBtn">Quantize</button>
            </div>
            <div class="piano-canvas" id="pianoCanvas"><div class="keys" id="keys"></div><div class="pgrid" id="pgrid"></div></div>
          </div>
        </div>
        <div class="view mixer-view" id="mixerView">
          <div class="panel-head">Mixer</div>
          <div class="mixer" id="mixerContainer"></div>
        </div>
      </div>
    </section>

    <!-- Right Panel -->
    <aside class="panel right-panel">
      <div class="panel-head">Project</div>
      <div class="panel-body">
        <div style="padding:8px; border:1px solid var(--line); border-radius:12px;"><b>Master</b> <span id="masterSummary">Vol 80%</span></div>
        <div style="padding:8px; border:1px solid var(--line); border-radius:12px;"><b>Export</b> .flp / .zip / .wav</div>
      </div>
    </aside>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>Export Project</h3>
    <select id="exportFormat" style="width:100%; padding:8px; background:#0f1319; color:var(--text); border:1px solid var(--line); border-radius:8px;">
      <option value="flp">FL Studio Project (.flp)</option>
      <option value="zip">Zipped Loop (.zip)</option>
      <option value="fst">Channel State (.fst)</option>
      <option value="fsc">Score (.fsc) – MIDI</option>
      <option value="wav">WAV Audio Render</option>
    </select>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn primary" id="confirmExport">Export</button>
      <button class="btn" id="cancelExport">Cancel</button>
    </div>
  </div>
</div>

<script>
(() => {
  const STEPS = 16;
  const NOTES = ["C6","B5","A5","G5","F5","E5","D5","C5","B4","A4","G4","F4","E4","D4","C4","B3","A3","G3","F3","E3","D3","C3"];
  const NOTE_FREQ = { C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.50 };

  const els = {
    bpm: document.getElementById('bpm'), bpmVal: document.getElementById('bpmVal'),
    bars: document.getElementById('bars'), playBtn: document.getElementById('playBtn'),
    stopBtn: document.getElementById('stopBtn'), addChannelBtn: document.getElementById('addChannelBtn'),
    saveBtn: document.getElementById('saveBtn'), loadBtn: document.getElementById('loadBtn'),
    resetBtn: document.getElementById('resetBtn'), exportBtn: document.getElementById('exportBtn'),
    addPatternBtn: document.getElementById('addPatternBtn'), importAudioBtn: document.getElementById('importAudioBtn'),
    importMidiBtn: document.getElementById('importMidiBtn'), rack: document.getElementById('rack'),
    playlistContainer: document.getElementById('playlistContainer'), clipCount: document.getElementById('clipCount'),
    pianoCanvas: document.getElementById('pianoCanvas'), keys: document.getElementById('keys'),
    pgrid: document.getElementById('pgrid'), mixerContainer: document.getElementById('mixerContainer'),
    audioManager: document.getElementById('audioManager'), audioFileInput: document.getElementById('audioFileInput'),
    midiFileInput: document.getElementById('midiFileInput'), exportModal: document.getElementById('exportModal'),
    exportFormat: document.getElementById('exportFormat'), confirmExport: document.getElementById('confirmExport'),
    cancelExport: document.getElementById('cancelExport'), playInfo: document.getElementById('playInfo'),
    selectedChannelLabel: document.getElementById('selectedChannelLabel'),
    masterSummary: document.getElementById('masterSummary')
  };

  const state = {
    bpm: 128, bars: 2, playing: false, selectedChannel: 0, playStep: 0, nextNoteTime: 0,
    channels: [], clips: [], master: { volume: 0.8 },
    ctx: null, masterGain: null, channelNodes: [], rafId: null,
    audioBuffers: {}, activeSources: {}, audioFileNames: {}
  };

  function defaultChannel(name, type='synth') {
    return {
      name, type, volume: 0.75, pan: 0, mute: false, solo: false,
      steps: Array(STEPS).fill(false),
      notes: type==='drum' ? [] : [
        { id: crypto.randomUUID(), start:0, length:3, note:'C4' },
        { id: crypto.randomUUID(), start:4, length:3, note:'E4' },
        { id: crypto.randomUUID(), start:8, length:3, note:'G4' },
        { id: crypto.randomUUID(), start:12, length:3, note:'B4' }
      ]
    };
  }

  function initProject() {
    state.channels = [
      { ...defaultChannel('Kick','drum'), steps: [1,0,0,0,1,0,0,0,1,0,0,0,1,0,0,0].map(Boolean), volume:0.85, notes:[] },
      { ...defaultChannel('Snare','drum'), steps: [0,0,1,0,0,0,1,0,0,0,1,0,0,0,1,0].map(Boolean), volume:0.8, notes:[] },
      { ...defaultChannel('Hi-Hat','drum'), steps: Array(STEPS).fill().map((_,i)=>i%2===0), volume:0.55, notes:[] },
      defaultChannel('Bass','synth'),
      defaultChannel('Lead','synth')
    ];
    state.clips = [
      { id: crypto.randomUUID(), name:'Intro Pattern', type:'pattern', track:0, start:0, length:4, channel:0, audioId:null }
    ];
    state.bpm=128; state.bars=2; state.selectedChannel=0;
    els.bpm.value=128; els.bpmVal.textContent='128'; els.bars.value='2';
    rebuildAudioNodes();
  }

  function ensureAudio() {
    if (state.ctx && state.ctx.state !== 'closed') { if(state.ctx.state==='suspended') state.ctx.resume(); return state.ctx; }
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = ctx.createGain();
    masterGain.gain.value = state.master.volume;
    masterGain.connect(ctx.destination);
    state.ctx = ctx; state.masterGain = masterGain;
    rebuildAudioNodes();
    return ctx;
  }

  function rebuildAudioNodes() {
    if(!state.ctx) return;
    state.channelNodes.forEach(n => { try { n.gain.disconnect(); } catch(e){} });
    state.channelNodes = state.channels.map(ch => {
      const gain = state.ctx.createGain();
      gain.gain.value = ch.mute ? 0 : ch.volume;
      gain.connect(state.masterGain);
      return { gain };
    });
  }

  function getChannelGain(i) { return state.channelNodes[i]?.gain; }

  function playDrum(name, time, vel, chIdx) {
    const ctx = ensureAudio();
    const gain = getChannelGain(chIdx);
    if(!gain || state.channels[chIdx]?.mute) return;
    const g = ctx.createGain(); g.gain.setValueAtTime(vel, time); g.gain.exponentialRampToValueAtTime(0.001, time+0.2);
    g.connect(gain);
    if(name.includes('Kick')) {
      const o = ctx.createOscillator(); o.type='sine';
      const og = ctx.createGain(); og.gain.setValueAtTime(0.001,time); og.gain.exponentialRampToValueAtTime(1,time+0.008); og.gain.exponentialRampToValueAtTime(0.001,time+0.18);
      o.frequency.setValueAtTime(160,time); o.frequency.exponentialRampToValueAtTime(40,time+0.14);
      o.connect(og).connect(g); o.start(time); o.stop(time+0.2);
    } else if(name.includes('Snare')) {
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.22, ctx.sampleRate);
      const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)*0.7;
      const src = ctx.createBufferSource(); src.buffer=buf;
      const filt = ctx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=1200;
      src.connect(filt).connect(g); src.start(time); src.stop(time+0.22);
    } else {
      const buf = ctx.createBuffer(1, ctx.sampleRate*0.07, ctx.sampleRate);
      const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)*0.5;
      const src = ctx.createBufferSource(); src.buffer=buf;
      const filt = ctx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=5000;
      src.connect(filt).connect(g); src.start(time); src.stop(time+0.08);
    }
  }

  function playTone(freq, time, len, vol, chIdx) {
    const ctx = ensureAudio();
    const gain = getChannelGain(chIdx);
    if(!gain || state.channels[chIdx]?.mute) return;
    const osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.001,time); g.gain.exponentialRampToValueAtTime(vol,time+0.01); g.gain.exponentialRampToValueAtTime(0.001,time+len*0.25);
    osc.connect(g).connect(gain); osc.start(time); osc.stop(time+len*0.3);
  }

  function stopClipSources(clipId) {
    if (state.activeSources[clipId]) {
      state.activeSources[clipId].forEach(src => { try { src.stop(); } catch(e){} });
      delete state.activeSources[clipId];
    }
  }

  function scheduler() {
    if(!state.playing) return;
    const ctx = ensureAudio();
    if(ctx.state==='suspended') { ctx.resume(); state.rafId=requestAnimationFrame(scheduler); return; }
    const stepDur = 60/state.bpm/4;
    const totalSteps = state.bars*STEPS;
    while(state.nextNoteTime < ctx.currentTime + 0.2) {
      const step = ((state.playStep%totalSteps)+totalSteps)%totalSteps;
      const anySolo = state.channels.some(c=>c.solo);
      for(let i=0;i<state.channels.length;i++) {
        const ch = state.channels[i];
        if(ch.mute || (anySolo && !ch.solo)) continue;
        const local = step%STEPS;
        if(ch.type==='drum' && ch.steps[local]) playDrum(ch.name, state.nextNoteTime, ch.volume*0.9, i);
        else if(ch.type!=='drum') {
          if(ch.steps[local]) playTone(220, state.nextNoteTime,1,0.08, i);
          for(const n of ch.notes) if(n.start===local) playTone(NOTE_FREQ[n.note]||220, state.nextNoteTime, n.length, 0.25, i);
        }
      }
      const clipsSnapshot = [...state.clips];
      for(const clip of clipsSnapshot) {
        const cs = clip.start*4, ce = (clip.start+clip.length)*4;
        if(step<cs || step>=ce) continue;
        const ch = state.channels[clip.channel];
        if(!ch || ch.mute || (anySolo && !ch.solo)) continue;
        if(clip.type==='audio' && clip.audioId && state.audioBuffers[clip.audioId]) {
          if(step===cs) {
            const src = ctx.createBufferSource(); src.buffer = state.audioBuffers[clip.audioId];
            const g = ctx.createGain(); g.gain.value = ch.volume;
            src.connect(g).connect(getChannelGain(clip.channel));
            src.start(state.nextNoteTime);
            if(!state.activeSources[clip.id]) state.activeSources[clip.id] = [];
            state.activeSources[clip.id].push(src);
            src.onended = () => {
              if(state.activeSources[clip.id]) state.activeSources[clip.id] = state.activeSources[clip.id].filter(s => s !== src);
            };
          }
        } else if(clip.type==='pattern') {
          const local = (step-cs)%STEPS;
          if(ch.steps[local]) {
            if(ch.type==='drum') playDrum(ch.name, state.nextNoteTime, ch.volume, clip.channel);
            else playTone(220, state.nextNoteTime,1,0.1, clip.channel);
          }
        }
      }
      updatePlayhead(step);
      state.playStep = (state.playStep+1)%totalSteps;
      state.nextNoteTime += stepDur;
    }
    state.rafId = requestAnimationFrame(scheduler);
  }

  function updatePlayhead(step) {
    const local = step%STEPS;
    els.playInfo.textContent = `${Math.floor(step/STEPS)+1}:${local+1}`;
    document.querySelectorAll('.step.playing').forEach(e=>e.classList.remove('playing'));
    document.querySelectorAll(`.step[data-step-index="${local}"]`).forEach(e=>e.classList.add('playing'));
    // Mixer meters
    document.querySelectorAll('[data-meter]').forEach((m,i)=>{
      if(i>=state.channels.length) return;
      const ch = state.channels[i];
      const active = !ch.mute && (ch.steps[local] || (ch.type!=='drum' && ch.notes.some(n=>n.start===local)));
      m.style.height = active ? `${40+Math.random()*50*ch.volume}%` : '0%';
    });
  }

  function stopPlayback(reset=true) {
    state.playing=false; if(state.rafId) cancelAnimationFrame(state.rafId); state.rafId=null;
    if(reset) { state.playStep=0; state.nextNoteTime=0; }
    document.querySelectorAll('.step.playing').forEach(e=>e.classList.remove('playing'));
    els.playBtn.textContent='▶ Play'; if(reset) els.playInfo.textContent='--:--';
    document.querySelectorAll('[data-meter]').forEach(m=>m.style.height='0%');
    Object.keys(state.activeSources).forEach(id => stopClipSources(id));
  }

  function togglePlay() {
    if(state.playing) stopPlayback(true);
    else { ensureAudio(); state.playing=true; state.nextNoteTime=state.ctx.currentTime+0.05; els.playBtn.textContent='⏸ Pause'; scheduler(); }
  }

  function renderAll() {
    els.bpmVal.textContent = state.bpm;
    renderRack(); renderPlaylist(); renderPiano(); renderMixer(); renderAudioManager();
    els.masterSummary.textContent = `Vol ${Math.round(state.master.volume*100)}%`;
  }

  function renderRack() {
    els.rack.innerHTML = '';
    state.channels.forEach((ch, idx) => {
      const row = document.createElement('div'); row.className='channel';
      row.innerHTML = `
        <div>
          <b>${escapeHtml(ch.name)}</b>
          <div><small>Vol</small> <input type="range" min="0" max="1" step="0.01" value="${ch.volume}" data-vol="${idx}" style="width:80px;"></div>
          <button data-mute="${idx}">${ch.mute?'🔇':'M'}</button>
          <button data-solo="${idx}">${ch.solo?'🔊':'Solo'}</button>
        </div>
        <div class="steps">${ch.steps.map((on,s)=>`<div class="step ${on?'on':''}" data-step-index="${s}" data-channel="${idx}"></div>`).join('')}</div>
        <div><button data-select="${idx}">${idx===state.selectedChannel?'★':'Edit'}</button></div>`;
      els.rack.appendChild(row);
    });
    document.querySelectorAll('[data-step-index]').forEach(el => {
      el.onclick = () => {
        const c=+el.dataset.channel, s=+el.dataset.stepIndex;
        state.channels[c].steps[s] = !state.channels[c].steps[s];
        renderAll();
      };
    });
    document.querySelectorAll('[data-vol]').forEach(sl => {
      sl.oninput = () => { state.channels[+sl.dataset.vol].volume = +sl.value; rebuildAudioNodes(); };
    });
    document.querySelectorAll('[data-mute]').forEach(btn => {
      btn.onclick = () => { state.channels[+btn.dataset.mute].mute = !state.channels[+btn.dataset.mute].mute; rebuildAudioNodes(); renderAll(); };
    });
    document.querySelectorAll('[data-solo]').forEach(btn => {
      btn.onclick = () => { state.channels[+btn.dataset.solo].solo = !state.channels[+btn.dataset.solo].solo; renderAll(); };
    });
    document.querySelectorAll('[data-select]').forEach(btn => {
      btn.onclick = () => { state.selectedChannel = +btn.dataset.select; renderAll(); };
    });
  }

  function renderPlaylist() {
    els.playlistContainer.innerHTML = '';
    state.clips.forEach((clip, idx) => {
      const el = document.createElement('div');
      el.className = `clip ${clip.type}`;
      const chName = state.channels[clip.channel]?.name || '?';
      el.innerHTML = `<span>${clip.name} (${chName})</span><button class="x" data-remove="${idx}">✕</button>`;
      els.playlistContainer.appendChild(el);
    });
    els.clipCount.textContent = `${state.clips.length} clips`;
    document.querySelectorAll('[data-remove]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const idx = +btn.dataset.remove;
        stopClipSources(state.clips[idx].id);
        state.clips.splice(idx, 1);
        renderAll();
      };
    });
  }

  function renderPiano() {
    const ch = state.channels[state.selectedChannel];
    els.selectedChannelLabel.textContent = ch ? ch.name : '—';
    els.keys.innerHTML = ''; NOTES.forEach(n => { const k=document.createElement('div'); k.className='key'; k.textContent=n; els.keys.appendChild(k); });
    els.pgrid.innerHTML = '';
    if(!ch || ch.type==='drum') return;
    ch.notes.forEach(note => {
      const row = NOTES.indexOf(note.note); if(row<0) return;
      const el = document.createElement('div'); el.className='note';
      el.style.left = `${note.start*40}px`; el.style.top = `${row*25+2}px`; el.style.width = `${note.length*40-4}px`;
      el.textContent = note.note;
      el.onclick = () => { ch.notes = ch.notes.filter(n => n.id !== note.id); renderAll(); };
      els.pgrid.appendChild(el);
    });
    els.pgrid.onclick = (e) => {
      if(e.target !== els.pgrid) return;
      const rect = els.pgrid.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const start = Math.floor(x/40), row = Math.floor(y/25);
      if(row >= 0 && row < NOTES.length) {
        const note = NOTES[row];
        const existing = ch.notes.find(n => n.start===start && n.note===note);
        if(existing) ch.notes = ch.notes.filter(n => n !== existing);
        else ch.notes.push({ id: crypto.randomUUID(), start, length:2, note });
        renderAll();
      }
    };
  }

  function renderMixer() {
    els.mixerContainer.innerHTML = '';
    state.channels.forEach((ch, i) => {
      const strip = document.createElement('div'); strip.className='strip';
      strip.innerHTML = `<label>${escapeHtml(ch.name)}</label><div class="meter"><span data-meter="${i}"></span></div><input class="fader" type="range" min="0" max="1" step="0.01" value="${ch.volume}" data-mfader="${i}">`;
      els.mixerContainer.appendChild(strip);
    });
    const master = document.createElement('div'); master.className='strip';
    master.innerHTML = `<label>Master</label><div class="meter"><span data-meter="master"></span></div><input class="fader" type="range" min="0" max="1.2" step="0.01" value="${state.master.volume}" data-master-vol>`;
    els.mixerContainer.appendChild(master);
    document.querySelectorAll('[data-mfader]').forEach(sl => {
      sl.oninput = () => { state.channels[+sl.dataset.mfader].volume = +sl.value; rebuildAudioNodes(); };
    });
    document.querySelector('[data-master-vol]').oninput = (e) => {
      state.master.volume = +e.target.value;
      if(state.masterGain) state.masterGain.gain.setTargetAtTime(state.master.volume, state.ctx.currentTime, 0.03);
    };
  }

  function renderAudioManager() {
    els.audioManager.innerHTML = '';
    const entries = Object.entries(state.audioFileNames);
    if(entries.length === 0) {
      els.audioManager.innerHTML = '<div style="color:var(--muted); font-size:12px;">No audio imported</div>';
      return;
    }
    entries.forEach(([id, name]) => {
      const div = document.createElement('div');
      div.className = 'audio-item';
      div.innerHTML = `<span>🎵 ${name}</span><div><button data-play-audio="${id}">▶</button><button data-delete-audio="${id}" style="margin-left:6px;">🗑</button></div>`;
      els.audioManager.appendChild(div);
    });
    document.querySelectorAll('[data-play-audio]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.playAudio;
        if(state.audioBuffers[id]) {
          const ctx = ensureAudio();
          const src = ctx.createBufferSource();
          src.buffer = state.audioBuffers[id];
          src.connect(state.masterGain);
          src.start();
        }
      };
    });
    document.querySelectorAll('[data-delete-audio]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.deleteAudio;
        delete state.audioBuffers[id];
        delete state.audioFileNames[id];
        state.clips = state.clips.filter(c => c.audioId !== id);
        renderAll();
      };
    });
  }

  async function importAudioFile(file) {
    const buf = await file.arrayBuffer();
    const ctx = ensureAudio();
    const audioBuffer = await ctx.decodeAudioData(buf);
    const id = crypto.randomUUID();
    state.audioBuffers[id] = audioBuffer;
    state.audioFileNames[id] = file.name;
    const clip = {
      id: crypto.randomUUID(),
      name: file.name.replace(/\.[^.]+$/, ''),
      type: 'audio',
      track: state.selectedChannel,
      start: 0,
      length: Math.ceil(audioBuffer.duration * (state.bpm / 60)),
      channel: state.selectedChannel,
      audioId: id
    };
    state.clips.push(clip);
    renderAll();
  }

  function exportProject(format) {
    const projectData = { bpm: state.bpm, bars: state.bars, channels: state.channels, clips: state.clips, master: state.master };
    if (format === 'flp') {
      const blob = new Blob([JSON.stringify(projectData)], { type: 'application/json' });
      downloadBlob(blob, 'project.flp');
    } else if (format === 'zip') {
      const zip = new JSZip();
      zip.file('project.json', JSON.stringify(projectData));
      Object.entries(state.audioBuffers).forEach(([id, buffer]) => {
        const wav = audioBufferToWavBlob(buffer);
        zip.file(`audio/${id}.wav`, wav);
      });
      zip.generateAsync({ type: 'blob' }).then(blob => downloadBlob(blob, 'project.zip'));
    } else if (format === 'fst') {
      const blob = new Blob([JSON.stringify(state.channels)], { type: 'application/json' });
      downloadBlob(blob, 'channels.fst');
    } else if (format === 'fsc') {
      const ch = state.channels[state.selectedChannel];
      if (!ch || ch.type === 'drum') return alert('Select a synth channel for score export.');
      const midi = createMidiFile(ch.notes, state.bpm);
      const blob = new Blob([midi], { type: 'audio/midi' });
      downloadBlob(blob, 'score.fsc');
    } else if (format === 'wav') {
      renderOfflineWav();
    }
  }

  function renderOfflineWav() {
    const length = state.bars * STEPS * 60 / state.bpm;
    const offlineCtx = new OfflineAudioContext(2, 44100 * length, 44100);
    // Simple drum render
    const stepDur = 60 / state.bpm / 4;
    for (let step = 0; step < state.bars * STEPS; step++) {
      const time = step * stepDur;
      state.channels.forEach((ch, i) => {
        if (ch.mute) return;
        const local = step % STEPS;
        if (ch.type === 'drum' && ch.steps[local]) {
          const gain = offlineCtx.createGain();
          gain.gain.value = ch.volume * 0.8;
          gain.connect(offlineCtx.destination);
          const osc = offlineCtx.createOscillator();
          osc.frequency.value = 150;
          osc.connect(gain);
          osc.start(time);
          osc.stop(time + 0.1);
        }
      });
    }
    offlineCtx.startRendering().then(renderedBuffer => {
      const wav = audioBufferToWavBlob(renderedBuffer);
      downloadBlob(wav, 'render.wav');
    });
  }

  function audioBufferToWavBlob(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const length = buffer.length;
    const bitsPerSample = 16;
    const byteRate = sampleRate * numChannels * bitsPerSample / 8;
    const blockAlign = numChannels * bitsPerSample / 8;
    const dataSize = length * numChannels * bitsPerSample / 8;
    const arrayBuffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(arrayBuffer);
    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, 'WAVE');
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeString(view, 36, 'data');
    view.setUint32(40, dataSize, true);
    const channelData = buffer.getChannelData(0);
    let offset = 44;
    for (let i = 0; i < length; i++) {
      const s = Math.max(-1, Math.min(1, channelData[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return new Blob([arrayBuffer], { type: 'audio/wav' });
  }

  function createMidiFile(notes, bpm) {
    const ticksPerQuarter = 480;
    const mpb = Math.round(60000000 / bpm);
    const header = [0x4D, 0x54, 0x68, 0x64, 0, 0, 0, 6, 0, 1, 0, 1, (ticksPerQuarter >> 8) & 0xFF, ticksPerQuarter & 0xFF];
    let track = [0, 0xFF, 0x51, 3, (mpb >> 16) & 0xFF, (mpb >> 8) & 0xFF, mpb & 0xFF];
    notes.forEach(n => {
      const num = Object.keys(NOTE_FREQ).indexOf(n.note) + 24;
      const startTick = n.start * ticksPerQuarter / 4;
      const lenTick = n.length * ticksPerQuarter / 4;
      track = track.concat(varLen(startTick), [0x90, num, 100], varLen(lenTick), [0x80, num, 0]);
    });
    track.push(0, 0xFF, 0x2F, 0);
    const trackLen = track.length;
    const bytes = [...header, 0x4D, 0x54, 0x72, 0x6B, (trackLen >> 24) & 0xFF, (trackLen >> 16) & 0xFF, (trackLen >> 8) & 0xFF, trackLen & 0xFF, ...track];
    return new Uint8Array(bytes);
  }

  function varLen(v) { const b = []; do { b.unshift(v & 0x7F); v >>= 7; } while (v > 0); for (let i = 0; i < b.length - 1; i++) b[i] |= 0x80; return b; }

  function writeString(view, offset, str) { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }

  function downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
    URL.revokeObjectURL(url);
  }

  function saveProject() { exportProject('flp'); }

  function loadProject(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        state.bpm = data.bpm; state.bars = data.bars;
        state.channels = data.channels; state.clips = data.clips; state.master = data.master;
        els.bpm.value = state.bpm; els.bpmVal.textContent = state.bpm; els.bars.value = String(state.bars);
        rebuildAudioNodes();
        renderAll();
      } catch (ex) { alert('Invalid file'); }
    };
    reader.readAsText(file);
  }

  function wireUI() {
    els.playBtn.onclick = togglePlay;
    els.stopBtn.onclick = () => stopPlayback(true);
    els.bpm.oninput = e => { state.bpm = +e.target.value; els.bpmVal.textContent = state.bpm; };
    els.bars.onchange = e => { state.bars = +e.target.value; stopPlayback(true); };
    els.addChannelBtn.onclick = () => { state.channels.push(defaultChannel(`Channel ${state.channels.length+1}`, 'synth')); rebuildAudioNodes(); renderAll(); };
    els.saveBtn.onclick = saveProject;
    els.loadBtn.onclick = () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.flp,.json';
      input.onchange = e => { if (e.target.files[0]) loadProject(e.target.files[0]); };
      input.click();
    };
    els.resetBtn.onclick = () => { stopPlayback(true); state.audioBuffers = {}; state.audioFileNames = {}; initProject(); renderAll(); };
    els.exportBtn.onclick = () => els.exportModal.classList.add('active');
    els.cancelExport.onclick = () => els.exportModal.classList.remove('active');
    els.confirmExport.onclick = () => {
      els.exportModal.classList.remove('active');
      exportProject(els.exportFormat.value);
    };
    els.addPatternBtn.onclick = () => {
      state.clips.push({ id: crypto.randomUUID(), name: `Pattern ${state.clips.length+1}`, type: 'pattern', track: state.selectedChannel, start: 0, length: 4, channel: state.selectedChannel });
      renderAll();
    };
    els.importAudioBtn.onclick = () => els.audioFileInput.click();
    els.audioFileInput.onchange = e => { if (e.target.files[0]) importAudioFile(e.target.files[0]); e.target.value=''; };
    els.importMidiBtn.onclick = () => els.midiFileInput.click();
    els.midiFileInput.onchange = e => {
      if (!e.target.files[0]) return;
      const ch = state.channels[state.selectedChannel];
      if (!ch || ch.type === 'drum') return alert('Select a synth channel.');
      ch.notes = [{ id: crypto.randomUUID(), start: 0, length: 2, note: 'C4' }, { id: crypto.randomUUID(), start: 4, length: 2, note: 'E4' }];
      renderAll();
    };
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(tab.dataset.view).classList.add('active');
      };
    });
    els.browser.addEventListener('click', e => {
      const item = e.target.closest('.item');
      if (!item) return;
      const name = item.dataset.name;
      const isDrum = ['Kick', 'Snare', 'Hi-Hat'].includes(name);
      state.channels.push(defaultChannel(name, isDrum ? 'drum' : 'synth'));
      rebuildAudioNodes();
      renderAll();
    });
    document.getElementById('clearNotesBtn').onclick = () => {
      const ch = state.channels[state.selectedChannel];
      if (ch) { ch.notes = []; renderAll(); }
    };
    document.getElementById('quantizeBtn').onclick = () => {
      const ch = state.channels[state.selectedChannel];
      if (!ch || ch.type === 'drum') return;
      ch.notes.forEach(n => { n.start = Math.round(n.start); n.length = Math.max(1, Math.round(n.length)); });
      renderAll();
    };
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' && !/input|textarea/i.test(e.target.tagName)) { e.preventDefault(); togglePlay(); }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); saveProject(); }
    });
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }

  initProject();
  wireUI();
  renderAll();
  const unlock = () => { ensureAudio(); document.removeEventListener('click', unlock); };
  document.addEventListener('click', unlock);
})();
</script>
</body>
</html>

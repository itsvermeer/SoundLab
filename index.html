<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ITS.Vermeer Music SoundLab - FL Studio UI</title>
  <!-- External libraries – same as your version -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.39/Tone.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.15.7/dist/soundfont-player.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.27/build/Midi.min.js"></script>
  <script src="https://unpkg.com/wavesurfer.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ───── FL‑Studio Dark Theme ───── */
    :root {
      --bg-dark: #1a1a1d;
      --bg-panel: #212124;
      --bg-surface: #2a2a2e;
      --bg-raised: #333338;
      --border: #3a3a40;
      --border-light: #4a4a52;
      --text-primary: #d0d0d8;
      --text-secondary: #a0a0aa;
      --text-bright: #f0f0f5;
      --accent: #f7931e;
      --accent-hover: #ffaa33;
      --green: #4caf50;
      --red: #e53935;
      --blue: #42a5f5;
      --purple: #ab47bc;
      --font: 'Segoe UI', 'Inter', sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { 
      width:100%; height:100%; overflow:hidden; background:var(--bg-dark); 
      color:var(--text-primary); font-family:var(--font); font-size:13px; 
      user-select:none; -webkit-user-select:none;
    }

    #app { display:flex; flex-direction:column; height:100vh; width:100vw; min-width:1100px; min-height:650px; }

    /* Menu bar */
    #menu-bar { display:flex; align-items:center; height:28px; background:#1c1c1f; border-bottom:1px solid var(--border); padding:0 4px; gap:2px; z-index:200; }
    #menu-bar .menu-item { padding:4px 10px; cursor:pointer; border-radius:3px; font-size:12px; font-weight:500; color:var(--text-secondary); }
    #menu-bar .menu-item:hover { background:var(--bg-raised); color:var(--text-bright); }
    .logo { font-weight:700; color:var(--accent); font-size:13px; padding:4px 12px; letter-spacing:1px; }

    /* Transport */
    #transport-bar { display:flex; align-items:center; height:44px; background:var(--bg-panel); border-bottom:1px solid var(--border); padding:0 10px; gap:8px; }
    #transport-bar button { background:var(--bg-surface); border:1px solid var(--border-light); color:var(--text-primary); border-radius:4px; cursor:pointer; padding:6px 12px; font-weight:600; }
    #transport-bar button:hover { background:var(--bg-raised); }
    #bpm-display { background:var(--bg-dark); border:1px solid var(--border-light); color:var(--accent); font-weight:700; font-size:16px; padding:4px 10px; border-radius:3px; width:60px; text-align:center; }
    #time-display { font-family:var(--font-mono); margin-left:auto; color:var(--text-secondary); }

    /* Main layout */
    #main-content { display:flex; flex:1; overflow:hidden; }
    #browser-panel { width:180px; background:var(--bg-panel); border-right:1px solid var(--border); overflow-y:auto; }
    .panel-header { padding:8px 12px; font-weight:700; text-transform:uppercase; font-size:11px; color:var(--text-secondary); border-bottom:1px solid var(--border); }
    .browser-item { padding:6px 12px; cursor:pointer; color:var(--text-secondary); border-left:2px solid transparent; }
    .browser-item:hover { background:var(--bg-surface); border-left-color:var(--accent); color:var(--text-bright); }

    #center-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #channel-rack { background:var(--bg-panel); border-bottom:2px solid var(--border); display:flex; flex-wrap:wrap; padding:10px; gap:5px; }
    #piano-roll-container { flex:1; display:flex; overflow:hidden; }
    #piano-keys { width:60px; display:flex; flex-direction:column; overflow-y:auto; background:var(--bg-panel); border-right:1px solid var(--border); }
    .piano-key { height:20px; border-bottom:1px solid #2a2a30; display:flex; align-items:center; justify-content:flex-end; padding-right:5px; font-size:9px; color:#777; cursor:pointer; }
    .piano-key.white { background:#2c2c34; }
    .piano-key.black { background:#1a1a20; color:#555; height:16px; margin-top:-2px; margin-bottom:-2px; }
    #piano-grid { flex:1; overflow:auto; }

    /* Mixer */
    #mixer { height:120px; background:#1a1a20; border-top:2px solid var(--border); display:flex; overflow-x:auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#3a3a44; border-radius:3px; }

    /* Override any remaining white cards from original */
    .section, .controls, .upload-area, .status-message { 
      background:var(--bg-surface) !important; border:1px solid var(--border) !important; 
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Menu bar -->
  <div id="menu-bar">
    <span class="logo">♪ ITS.Vermeer SoundLab</span>
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Help</span>
  </div>

  <!-- Transport bar -->
  <div id="transport-bar">
    <button id="btn-stop">■</button>
    <button id="btn-play">▶</button>
    <span style="margin-left:10px;">BPM</span>
    <span id="bpm-display" contenteditable="true">140</span>
    <button id="bpm-up">+</button><button id="bpm-down">−</button>
    <span style="margin-left:20px;">Pattern</span>
    <span style="background:var(--bg-dark); padding:4px 12px; border-radius:3px; color:#ffcc80;">Pattern 1</span>
    <span id="time-display">000:00:00</span>
  </div>

  <!-- Main content split -->
  <div id="main-content">
    <!-- Browser panel (left) -->
    <div id="browser-panel">
      <div class="panel-header">📁 Browser</div>
      <div class="browser-item" onclick="loadInstrument('acoustic_grand_piano')">🎹 Grand Piano</div>
      <div class="browser-item" onclick="loadInstrument('electric_piano_1')">🎹 Electric Piano</div>
      <div class="browser-item" onclick="loadInstrument('acoustic_guitar_nylon')">🎸 Acoustic Guitar</div>
      <div class="browser-item" onclick="loadInstrument('acoustic_bass')">🎸 Bass Guitar</div>
      <div class="browser-item" onclick="loadInstrument('honkytonk_piano')">🎹 Honky Tonk</div>
      <div class="browser-item" style="margin-top:10px;"><i class="fas fa-drum"></i> Drum Kits</div>
      <div class="browser-item" onclick="document.getElementById('audio-upload').click()">
        <i class="fas fa-upload"></i> Load Audio...
        <input type="file" id="audio-upload" accept="audio/*" style="display:none" onchange="handleAudioUpload(event)">
      </div>
      <div class="browser-item" onclick="document.getElementById('midi-upload').click()">
        <i class="fas fa-file-import"></i> Load MIDI...
        <input type="file" id="midi-upload" accept=".mid" style="display:none" onchange="loadMidi(event)">
      </div>
    </div>

    <!-- Center area -->
    <div id="center-area">
      <!-- Channel Rack (drum machine) -->
      <div id="channel-rack">
        <!-- Drum pads (16 steps) will be injected here by JS -->
      </div>

      <!-- Piano Roll (simplified: shows keyboard + empty grid placeholder) -->
      <div id="piano-roll-container">
        <div id="piano-keys">
          <!-- Generated in JS -->
        </div>
        <div id="piano-grid">
          <!-- For brevity, we reuse the uploaded track list area -->
          <div id="midi-tracks" style="padding:10px; color:var(--text-secondary);">
            <div class="status-message">Click an instrument in the Browser or press keyboard keys A–L to play notes.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mixer strip -->
  <div id="mixer">
    <!-- Meter displays – placeholder for demo -->
    <div class="mixer-channel" style="padding:10px; color:var(--text-secondary);">Master</div>
  </div>
</div>

<script>
  // ─── Your existing JavaScript (almost unchanged) ───
  // I wrapped it in an IIFE to avoid global name clashes
  (function() {
    const instruments = [];
    let isPlaying = false;
    let drumLoopActive = true;
    const drumSteps = new Array(16).fill(false);
    const drumSynth = new Tone.MembraneSynth().toDestination();
    let currentInstrument = null;
    let audioContextInitialized = false;

    // ── DOM elements (adjusted IDs) ──
    const btnPlay = document.getElementById('btn-play');
    const btnStop = document.getElementById('btn-stop');
    const bpmDisplay = document.getElementById('bpm-display');
    const channelRack = document.getElementById('channel-rack');
    const pianoKeys = document.getElementById('piano-keys');
    const midiTracks = document.getElementById('midi-tracks');

    // Create drum pads (16 steps)
    for (let i = 0; i < 16; i++) {
      const pad = document.createElement('div');
      pad.className = 'pad';
      pad.style.width = '40px';
      pad.style.height = '40px';
      pad.style.background = 'var(--bg-surface)';
      pad.style.border = '1px solid var(--border)';
      pad.style.borderRadius = '4px';
      pad.style.cursor = 'pointer';
      pad.style.display = 'flex';
      pad.style.alignItems = 'center';
      pad.style.justifyContent = 'center';
      pad.textContent = i + 1;
      pad.onclick = () => {
        drumSteps[i] = !drumSteps[i];
        pad.style.background = drumSteps[i] ? '#f7931e' : 'var(--bg-surface)';
        drumSynth.triggerAttackRelease("C2", "8n");
      };
      channelRack.appendChild(pad);
    }

    // Create piano keys (2 octaves)
    function createPianoKeys() {
      const whiteNotes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
      const blackNotes = ['C#', 'D#', '', 'F#', 'G#', 'A#', ''];
      for (let octave = 3; octave <= 4; octave++) {
        whiteNotes.forEach((note) => {
          const key = document.createElement('div');
          key.className = 'piano-key white';
          key.textContent = note + octave;
          key.dataset.note = `${note}${octave}`;
          key.onclick = () => playNote(`${note}${octave}`);
          pianoKeys.appendChild(key);
        });
        blackNotes.forEach((note, index) => {
          if (note) {
            const key = document.createElement('div');
            key.className = 'piano-key black';
            key.dataset.note = `${note}${octave}`;
            key.onclick = () => playNote(`${note}${octave}`);
            pianoKeys.appendChild(key);
          }
        });
      }
    }
    createPianoKeys();

    // Keyboard mapping
    const keyboardMap = {
      'a': 'C4', 'w': 'C#4', 's': 'D4', 'e': 'D#4',
      'd': 'E4', 'f': 'F4', 't': 'F#4', 'g': 'G4',
      'y': 'G#4', 'h': 'A4', 'u': 'A#4', 'j': 'B4',
      'k': 'C5', 'o': 'C#5', 'l': 'D5', 'p': 'D#5', ';': 'E5'
    };
    document.addEventListener('keydown', (e) => {
      const note = keyboardMap[e.key];
      if (note && currentInstrument) {
        if (!audioContextInitialized) return;
        playNote(note);
      }
    });

    function playNote(note) {
      if (!currentInstrument) {
        midiTracks.innerHTML = '<div class="status-message">Please load an instrument first.</div>';
        return;
      }
      currentInstrument.play(note, Tone.context.currentTime, { duration: 1, gain: 0.5 });
    }

    // Drum loop
    Tone.Transport.scheduleRepeat((time) => {
      if (!drumLoopActive) return;
      const step = Math.floor((Tone.Transport.seconds * 4) % 16);
      if (drumSteps[step]) {
        drumSynth.triggerAttackRelease("C2", "8n", time);
      }
      // Visual step indicator
      const pads = channelRack.children;
      for (let i = 0; i < pads.length; i++) {
        pads[i].style.boxShadow = i === step ? '0 0 8px #f7931e' : '';
      }
    }, "16n");

    // Load instrument function
    window.loadInstrument = function(instrumentType) {
      if (!audioContextInitialized) {
        midiTracks.innerHTML = '<div class="status-message">Please enable audio first (click "Enable Audio" would be in menu, for now click any key to init).</div>';
        return;
      }
      Soundfont.instrument(Tone.context, instrumentType).then(instrument => {
        currentInstrument = instrument;
        midiTracks.innerHTML = `<div class="status-message"><i class="fas fa-check"></i> ${instrumentType} loaded. Use keyboard A–L or click piano keys.</div>`;
        playNote('C4'); // test sound
      }).catch(e => {
        midiTracks.innerHTML = `<div class="status-message" style="color:red;">Error loading ${instrumentType}</div>`;
      });
    };

    // Audio upload & waveform (simplified – uses a hidden wavesurfer for now)
    const wavesurfer = WaveSurfer.create({
      container: document.createElement('div'),
      waveColor: '#888',
      progressColor: '#f7931e',
      height: 0
    });

    window.handleAudioUpload = async function(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(e) {
        const blob = new Blob([e.target.result]);
        const buffer = await Tone.context.decodeAudioData(await blob.arrayBuffer());
        const player = new Tone.Player(buffer).toDestination();
        player.sync().start(0);
        instruments.push({ player });
        midiTracks.innerHTML += `<div class="status-message">✔ Uploaded ${file.name}</div>`;
      };
      reader.readAsArrayBuffer(file);
    };

    // MIDI import
    window.loadMidi = async function(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const midi = new Midi(e.target.result);
          midiTracks.innerHTML = '';
          midi.tracks.forEach(track => {
            const synth = new Tone.Synth().toDestination();
            const part = new Tone.Part((time, note) => {
              synth.triggerAttackRelease(note.name, note.duration, time, note.velocity);
            }, track.notes).start(0);
            instruments.push({ synth, part });
            midiTracks.innerHTML += `<div class="status-message">✔ MIDI Track: ${track.name || 'Unnamed'} (${track.notes.length} notes)</div>`;
          });
        } catch (error) {
          midiTracks.innerHTML = '<div class="status-message" style="color:red;">Invalid MIDI file</div>';
        }
      };
      reader.readAsArrayBuffer(file);
    };

    // Transport controls
    btnPlay.addEventListener('click', () => {
      if (!audioContextInitialized) {
        Tone.start().then(() => { audioContextInitialized = true; });
        return;
      }
      if (isPlaying) {
        Tone.Transport.pause();
        isPlaying = false;
        btnPlay.textContent = '▶';
      } else {
        Tone.Transport.start();
        isPlaying = true;
        btnPlay.textContent = '⏸';
      }
    });
    btnStop.addEventListener('click', () => {
      Tone.Transport.stop();
      isPlaying = false;
      btnPlay.textContent = '▶';
    });

    // Enable audio on first user interaction (e.g., clicking any key or the transport)
    document.body.addEventListener('click', () => {
      if (!audioContextInitialized) {
        Tone.start().then(() => { audioContextInitialized = true; });
      }
    }, { once: true });

    // BPM control
    document.getElementById('bpm-up').addEventListener('click', () => {
      let bpm = parseInt(bpmDisplay.textContent) || 140;
      bpm = Math.min(300, bpm + 1);
      bpmDisplay.textContent = bpm;
      Tone.Transport.bpm.value = bpm;
    });
    document.getElementById('bpm-down').addEventListener('click', () => {
      let bpm = parseInt(bpmDisplay.textContent) || 140;
      bpm = Math.max(20, bpm - 1);
      bpmDisplay.textContent = bpm;
      Tone.Transport.bpm.value = bpm;
    });
    bpmDisplay.addEventListener('input', () => {
      let bpm = parseInt(bpmDisplay.textContent);
      if (!isNaN(bpm)) Tone.Transport.bpm.value = bpm;
    });

    // Keep your visualizer if you want (omitted for brevity, but can be added back)
  })();
</script>
</body>
</html>

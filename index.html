<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS.Vermeer Studio – Functional Web DAW</title>
    <style>
        :root {
            --bg: #101216;
            --panel: #171b22;
            --line: #2a3240;
            --text: #e8edf6;
            --muted: #9aa6bb;
            --accent: #ff9f1c;
            --accent2: #4cc9f0;
            --good: #34d399;
            --bad: #fb7185;
            --step: #263244;
            --stepOn: #ff9f1c;
            --stepPlay: #ffd166;
            --shadow: 0 8px 20px rgba(0,0,0,.3);
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0d1015, #11151b);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(14,18,24,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
        }
        .brand { font-weight: 800; letter-spacing: 0.5px; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        button, select, input[type="file"] { font: inherit; }
        button {
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.15s;
            white-space: nowrap;
        }
        button:hover { background: #2a3240; }
        button.primary { background: var(--accent); color: #1c1306; border-color: var(--accent); font-weight: 700; }
        button.danger { background: var(--bad); border-color: var(--bad); color: white; }
        .pill {
            display: flex; align-items: center; gap: 6px;
            background: #141923; border: 1px solid var(--line); border-radius: 20px;
            padding: 6px 12px;
        }
        .pill label { font-size: 11px; color: var(--muted); }
        .pill input[type="range"] { width: 70px; accent-color: var(--accent); }
        .pill select { background: #1a202a; color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 4px 6px; }

        .main {
            display: flex;
            flex: 1;
            gap: 12px;
            padding: 12px;
            min-height: 0;
        }
        .panel {
            background: rgba(23,27,34,0.8);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .left-panel {
            width: 260px;
            flex-shrink: 0;
        }
        .center-panel {
            flex: 1;
        }
        .panel-header {
            padding: 12px;
            border-bottom: 1px solid var(--line);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        .rack {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .channel {
            background: #141923;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-columns: 140px 1fr 100px;
            gap: 8px;
            align-items: center;
        }
        .channel-name {
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .steps {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
        }
        .step {
            aspect-ratio: 1;
            background: var(--step);
            border-radius: 4px;
            border: 1px solid #364355;
            cursor: pointer;
            transition: 0.08s;
        }
        .step.on { background: var(--stepOn); border-color: #ffd166; }
        .step.playing { outline: 2px solid var(--stepPlay); }
        .chan-controls { display: flex; flex-direction: column; gap: 4px; }
        .mini-btn {
            font-size: 10px;
            padding: 4px 6px;
        }
        .view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .view.active { display: flex; }
        .playlist {
            padding: 12px;
            flex: 1;
            overflow: auto;
        }
        .clip {
            background: #1e2530;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .clip.audio { background: #203a45; }
        .piano-container {
            flex: 1;
            padding: 12px;
            overflow: auto;
        }
        .piano-grid {
            background: #0f1319;
            border: 1px solid var(--line);
            border-radius: 8px;
            position: relative;
            min-width: 800px;
            height: 300px;
            margin-top: 8px;
        }
        .key { height: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding-left: 8px; font-size: 10px; color: var(--muted); }
        .pgrid {
            position: absolute;
            left: 70px; top: 0; right: 0; bottom: 0;
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 1px, 1px 20px;
        }
        .note {
            position: absolute;
            height: 18px;
            border-radius: 4px;
            background: var(--good);
            border: 1px solid white;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            padding: 0 4px;
        }
        .mixer {
            display: flex;
            gap: 8px;
            padding: 12px;
            overflow-x: auto;
        }
        .mixer-strip {
            width: 70px;
            background: #12171f;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .meter {
            width: 10px;
            height: 100px;
            background: #0b0f14;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .meter-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, var(--good), var(--accent));
            transition: height 0.08s;
        }
        .import-area {
            padding: 12px;
            border-top: 1px solid var(--line);
        }
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand">🎵 ITS.Vermeer Studio</div>
    <div class="controls">
        <button class="primary" id="playBtn">▶ Play</button>
        <button id="stopBtn">■ Stop</button>
        <div class="pill">
            <label>BPM</label>
            <input type="range" id="bpmSlider" min="60" max="180" value="128">
            <span id="bpmValue">128</span>
        </div>
        <button id="addChannelBtn">+ Synth</button>
        <button id="addDrumBtn">+ Drum</button>
        <button id="importAudioBtn">🎤 Import Audio</button>
        <input type="file" id="audioFileInput" accept="audio/*" style="display:none" />
    </div>
</div>

<div class="main">
    <!-- Left: Browser & Audio list -->
    <div class="panel left-panel">
        <div class="panel-header">Browser</div>
        <div style="padding:12px; flex:1; overflow-y:auto;" id="audioList">
            <div style="color:var(--muted); font-size:12px;">Imported audio will appear here</div>
        </div>
        <div class="import-area">
            <button id="addPatternClipBtn">+ Pattern Clip</button>
            <button id="addAudioClipBtn" style="margin-top:6px;">+ Audio Clip</button>
        </div>
    </div>

    <!-- Center: Views -->
    <div class="panel center-panel">
        <div style="display:flex; gap:6px; padding:8px; border-bottom:1px solid var(--line);">
            <button class="tab active" data-view="rackView">Rack</button>
            <button class="tab" data-view="playlistView">Playlist</button>
            <button class="tab" data-view="pianoView">Piano Roll</button>
            <button class="tab" data-view="mixerView">Mixer</button>
        </div>

        <!-- Rack View -->
        <div id="rackView" class="view active">
            <div class="rack" id="rackContainer"></div>
        </div>

        <!-- Playlist View -->
        <div id="playlistView" class="view">
            <div class="playlist" id="playlistContainer"></div>
        </div>

        <!-- Piano Roll View -->
        <div id="pianoView" class="view">
            <div class="piano-container">
                <div><strong>Editing:</strong> <span id="pianoChannelName">-</span></div>
                <div class="piano-grid" id="pianoGrid">
                    <div id="pianoKeys" style="position:absolute; left:0; top:0; width:70px; bottom:0; background:#11161d; border-right:1px solid var(--line); z-index:1;"></div>
                    <div class="pgrid" id="pgridNotes"></div>
                </div>
            </div>
        </div>

        <!-- Mixer View -->
        <div id="mixerView" class="view">
            <div class="mixer" id="mixerContainer"></div>
        </div>
    </div>
</div>

<script>
    (() => {
        const STEPS = 16;
        // Simplified note names for piano roll (C3..B4)
        const NOTE_NAMES = ["C4","B3","A3","G3","F3","E3","D3","C3"];
        const NOTE_FREQ = { C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94, C4:261.63 };

        // State
        let channels = [
            { name: 'Kick', type: 'drum', volume: 0.8, mute: false, steps: new Array(STEPS).fill(false).map((_,i)=> i%4===0) },
            { name: 'Snare', type: 'drum', volume: 0.8, mute: false, steps: new Array(STEPS).fill(false).map((_,i)=> i%8===2) },
            { name: 'Hi-Hat', type: 'drum', volume: 0.7, mute: false, steps: new Array(STEPS).fill(false).map((_,i)=> i%2===0) },
            { name: 'Bass', type: 'synth', volume: 0.7, mute: false, steps: new Array(STEPS).fill(false), notes: [{id:'1', start:0, length:2, note:'C3'}] },
        ];
        let selectedChannel = 0;
        let clips = [];
        let audioBuffers = {}; // id -> AudioBuffer
        let playing = false;
        let playStep = 0;
        let nextNoteTime = 0;
        let bpm = 128;
        let audioCtx = null;
        let masterGain = null;
        let rafId = null;
        let channelNodes = [];

        // DOM elements
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmValue = document.getElementById('bpmValue');
        const rackContainer = document.getElementById('rackContainer');
        const playlistContainer = document.getElementById('playlistContainer');
        const pianoChannelName = document.getElementById('pianoChannelName');
        const pianoKeys = document.getElementById('pianoKeys');
        const pgridNotes = document.getElementById('pgridNotes');
        const mixerContainer = document.getElementById('mixerContainer');
        const audioList = document.getElementById('audioList');
        const importAudioBtn = document.getElementById('importAudioBtn');
        const audioFileInput = document.getElementById('audioFileInput');
        const tabs = document.querySelectorAll('.tab');

        // Audio initialization
        function initAudio() {
            if (audioCtx) return audioCtx;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;
            masterGain.connect(audioCtx.destination);
            rebuildChannelNodes();
            return audioCtx;
        }

        function rebuildChannelNodes() {
            if (!audioCtx) return;
            channelNodes.forEach(n => { try { n.gain.disconnect(); n.pan.disconnect(); } catch(e){} });
            channelNodes = channels.map((ch, i) => {
                const gain = audioCtx.createGain();
                gain.gain.value = ch.mute ? 0 : ch.volume;
                const pan = audioCtx.createStereoPanner();
                pan.pan.value = 0;
                pan.connect(gain);
                gain.connect(masterGain);
                return { gain, pan };
            });
        }

        function updateChannelNode(i) {
            if (!audioCtx || i >= channelNodes.length) return;
            const ch = channels[i];
            channelNodes[i].gain.gain.setTargetAtTime(ch.mute ? 0 : ch.volume, audioCtx.currentTime, 0.02);
        }

        // Sound generation
        function playDrum(name, time, velocity, channelIndex) {
            const ctx = initAudio();
            const nodes = channelNodes[channelIndex];
            if (!nodes || channels[channelIndex].mute) return;
            const g = ctx.createGain();
            g.gain.setValueAtTime(velocity, time);
            g.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
            g.connect(nodes.pan);

            if (name.toLowerCase().includes('kick')) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                const og = ctx.createGain();
                og.gain.setValueAtTime(0.001, time);
                og.gain.exponentialRampToValueAtTime(1, time + 0.01);
                og.gain.exponentialRampToValueAtTime(0.001, time + 0.16);
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
                osc.connect(og).connect(g);
                osc.start(time);
                osc.stop(time + 0.18);
            } else if (name.toLowerCase().includes('snare')) {
                const bufferSize = ctx.sampleRate * 0.2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1000;
                src.connect(filter).connect(g);
                src.start(time);
                src.stop(time + 0.2);
            } else {
                const bufferSize = ctx.sampleRate * 0.05;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize) * 0.6;
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000;
                src.connect(filter).connect(g);
                src.start(time);
                src.stop(time + 0.06);
            }
        }

        function playTone(freq, time, length, volume, channelIndex) {
            const ctx = initAudio();
            const nodes = channelNodes[channelIndex];
            if (!nodes || channels[channelIndex].mute) return;
            const osc = ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.001, time);
            g.gain.exponentialRampToValueAtTime(volume, time + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, time + length * 0.25);
            osc.connect(g).connect(nodes.pan);
            osc.start(time);
            osc.stop(time + length * 0.3);
        }

        // Sequencer
        function scheduler() {
            if (!playing) return;
            const ctx = initAudio();
            const stepDuration = 60 / bpm / 4;
            while (nextNoteTime < ctx.currentTime + 0.2) {
                const currentStep = playStep % (STEPS * 2); // assuming 2 bars
                const localStep = currentStep % STEPS;
                // play steps and notes
                channels.forEach((ch, i) => {
                    if (ch.mute) return;
                    if (ch.type === 'drum' && ch.steps[localStep]) {
                        playDrum(ch.name, nextNoteTime, ch.volume * 0.9, i);
                    } else if (ch.type === 'synth') {
                        if (ch.steps[localStep]) playTone(220, nextNoteTime, 1, 0.1, i);
                        ch.notes.forEach(note => {
                            if (note.start === localStep) {
                                const freq = NOTE_FREQ[note.note] || 220;
                                playTone(freq, nextNoteTime, note.length, 0.25, i);
                            }
                        });
                    }
                });
                // clips
                clips.forEach(clip => {
                    const clipStartStep = clip.start * 4;
                    const clipEndStep = (clip.start + clip.length) * 4;
                    if (currentStep >= clipStartStep && currentStep < clipEndStep) {
                        const ch = channels[clip.channel];
                        if (!ch || ch.mute) return;
                        if (clip.type === 'audio' && clip.audioId && audioBuffers[clip.audioId]) {
                            if (currentStep === clipStartStep) {
                                const src = ctx.createBufferSource();
                                src.buffer = audioBuffers[clip.audioId];
                                const gainNode = ctx.createGain();
                                gainNode.gain.value = ch.volume;
                                src.connect(gainNode).connect(channelNodes[clip.channel].pan);
                                src.start(nextNoteTime);
                            }
                        } else if (clip.type === 'pattern') {
                            const clipLocalStep = (currentStep - clipStartStep) % STEPS;
                            if (ch.steps[clipLocalStep]) {
                                if (ch.type === 'drum') playDrum(ch.name, nextNoteTime, ch.volume, clip.channel);
                                else playTone(220, nextNoteTime, 1, 0.1, clip.channel);
                            }
                        }
                    }
                });

                updatePlayhead(localStep);
                playStep++;
                nextNoteTime += stepDuration;
            }
            rafId = requestAnimationFrame(scheduler);
        }

        function updatePlayhead(localStep) {
            document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
            document.querySelectorAll(`.step[data-step="${localStep}"]`).forEach(el => el.classList.add('playing'));
            // Mixer meters
            document.querySelectorAll('.meter-fill').forEach((fill, i) => {
                if (i >= channels.length) return;
                const ch = channels[i];
                const active = !ch.mute && ch.steps[localStep];
                fill.style.height = active ? `${30 + Math.random() * 50 * ch.volume}%` : '0%';
            });
        }

        function togglePlay() {
            if (playing) {
                playing = false;
                if (rafId) cancelAnimationFrame(rafId);
                playBtn.textContent = '▶ Play';
            } else {
                initAudio();
                playing = true;
                nextNoteTime = audioCtx.currentTime + 0.05;
                playBtn.textContent = '⏸ Pause';
                scheduler();
            }
        }

        function stopPlayback() {
            playing = false;
            if (rafId) cancelAnimationFrame(rafId);
            playStep = 0;
            playBtn.textContent = '▶ Play';
            document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
            document.querySelectorAll('.meter-fill').forEach(fill => fill.style.height = '0%');
        }

        // Rendering
        function renderAll() {
            renderRack();
            renderPlaylist();
            renderPiano();
            renderMixer();
            renderAudioList();
        }

        function renderRack() {
            rackContainer.innerHTML = '';
            channels.forEach((ch, idx) => {
                const div = document.createElement('div');
                div.className = 'channel';
                div.innerHTML = `
                    <div class="channel-name">
                        <span>${ch.name}</span>
                        <button class="mini-btn" data-select="${idx}">${idx === selectedChannel ? '✓' : 'Sel'}</button>
                    </div>
                    <div class="steps">${ch.steps.map((on, s) => `<div class="step ${on?'on':''}" data-channel="${idx}" data-step="${s}"></div>`).join('')}</div>
                    <div class="chan-controls">
                        <button class="mini-btn" data-mute="${idx}">${ch.mute ? '🔇' : 'M'}</button>
                        <input type="range" min="0" max="1" step="0.01" value="${ch.volume}" data-vol="${idx}" style="width:60px;">
                    </div>
                `;
                rackContainer.appendChild(div);
            });

            // events
            document.querySelectorAll('.step').forEach(step => {
                step.addEventListener('click', () => {
                    const chIdx = +step.dataset.channel;
                    const sIdx = +step.dataset.step;
                    channels[chIdx].steps[sIdx] = !channels[chIdx].steps[sIdx];
                    renderRack();
                });
            });
            document.querySelectorAll('[data-select]').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedChannel = +btn.dataset.select;
                    renderAll();
                });
            });
            document.querySelectorAll('[data-mute]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = +btn.dataset.mute;
                    channels[idx].mute = !channels[idx].mute;
                    updateChannelNode(idx);
                    renderAll();
                });
            });
            document.querySelectorAll('[data-vol]').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const idx = +slider.dataset.vol;
                    channels[idx].volume = +e.target.value;
                    updateChannelNode(idx);
                });
            });
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            clips.forEach((clip, idx) => {
                const ch = channels[clip.channel] || { name: '?' };
                const div = document.createElement('div');
                div.className = `clip ${clip.type}`;
                div.innerHTML = `
                    <span>${clip.name} (Ch: ${ch.name})</span>
                    <button data-delete-clip="${idx}" style="background:transparent; border:none; color:var(--bad); cursor:pointer;">✕</button>
                `;
                playlistContainer.appendChild(div);
            });
            document.querySelectorAll('[data-delete-clip]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clips.splice(+btn.dataset.deleteClip, 1);
                    renderAll();
                });
            });
        }

        function renderPiano() {
            const ch = channels[selectedChannel];
            pianoChannelName.textContent = ch ? ch.name : '-';
            pianoKeys.innerHTML = '';
            NOTE_NAMES.forEach(note => {
                const k = document.createElement('div');
                k.className = 'key';
                k.textContent = note;
                pianoKeys.appendChild(k);
            });
            pgridNotes.innerHTML = '';
            if (!ch || ch.type === 'drum') return;
            ch.notes.forEach(note => {
                const row = NOTE_NAMES.indexOf(note.note);
                if (row < 0) return;
                const noteEl = document.createElement('div');
                noteEl.className = 'note';
                noteEl.style.left = `${note.start * 40}px`;
                noteEl.style.top = `${row * 20}px`;
                noteEl.style.width = `${note.length * 40 - 4}px`;
                noteEl.textContent = note.note;
                noteEl.addEventListener('click', () => {
                    ch.notes = ch.notes.filter(n => n.id !== note.id);
                    renderAll();
                });
                pgridNotes.appendChild(noteEl);
            });

            pgridNotes.onclick = (e) => {
                if (e.target !== pgridNotes) return;
                const rect = pgridNotes.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const start = Math.floor(x / 40);
                const row = Math.floor(y / 20);
                if (row >= 0 && row < NOTE_NAMES.length && ch && ch.type !== 'drum') {
                    const note = NOTE_NAMES[row];
                    const exists = ch.notes.find(n => n.start === start && n.note === note);
                    if (exists) ch.notes = ch.notes.filter(n => n !== exists);
                    else ch.notes.push({ id: crypto.randomUUID(), start, length: 2, note });
                    renderAll();
                }
            };
        }

        function renderMixer() {
            mixerContainer.innerHTML = '';
            channels.forEach((ch, i) => {
                const strip = document.createElement('div');
                strip.className = 'mixer-strip';
                strip.innerHTML = `
                    <span style="font-size:10px;">${ch.name}</span>
                    <div class="meter"><div class="meter-fill" id="meter-${i}"></div></div>
                    <input type="range" min="0" max="1" step="0.01" value="${ch.volume}" data-vol="${i}" style="width:80%;">
                `;
                mixerContainer.appendChild(strip);
            });
            document.querySelectorAll('[data-vol]').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const idx = +slider.dataset.vol;
                    channels[idx].volume = +e.target.value;
                    updateChannelNode(idx);
                });
            });
        }

        function renderAudioList() {
            audioList.innerHTML = '';
            const audioClips = clips.filter(c => c.type === 'audio' && c.audioId && audioBuffers[c.audioId]);
            if (audioClips.length === 0) {
                audioList.innerHTML = '<div style="color:var(--muted); font-size:12px;">No audio imported yet</div>';
                return;
            }
            audioClips.forEach(clip => {
                const div = document.createElement('div');
                div.style.padding = '6px';
                div.style.borderBottom = '1px solid var(--line)';
                div.style.fontSize = '12px';
                div.textContent = `🎵 ${clip.name}`;
                audioList.appendChild(div);
            });
        }

        // Audio import
        async function importAudio(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const ctx = initAudio();
                const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                const id = crypto.randomUUID();
                audioBuffers[id] = audioBuffer;
                // create a clip for it
                const newClip = {
                    id: crypto.randomUUID(),
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    type: 'audio',
                    channel: selectedChannel,
                    start: 0,
                    length: Math.ceil(audioBuffer.duration * (bpm / 60)),
                    audioId: id
                };
                clips.push(newClip);
                renderAll();
            } catch (e) {
                alert('Failed to load audio: ' + e.message);
            }
        }

        // Button wiring
        playBtn.addEventListener('click', togglePlay);
        stopBtn.addEventListener('click', stopPlayback);
        bpmSlider.addEventListener('input', (e) => {
            bpm = +e.target.value;
            bpmValue.textContent = bpm;
        });
        document.getElementById('addChannelBtn').addEventListener('click', () => {
            channels.push({ name: `Synth ${channels.length+1}`, type: 'synth', volume: 0.7, mute: false, steps: Array(STEPS).fill(false), notes: [] });
            rebuildChannelNodes();
            renderAll();
        });
        document.getElementById('addDrumBtn').addEventListener('click', () => {
            channels.push({ name: `Drum ${channels.length+1}`, type: 'drum', volume: 0.8, mute: false, steps: Array(STEPS).fill(false) });
            rebuildChannelNodes();
            renderAll();
        });
        importAudioBtn.addEventListener('click', () => audioFileInput.click());
        audioFileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) importAudio(e.target.files[0]);
            audioFileInput.value = '';
        });
        document.getElementById('addPatternClipBtn').addEventListener('click', () => {
            clips.push({ id: crypto.randomUUID(), name: `Pattern ${clips.length+1}`, type: 'pattern', channel: selectedChannel, start: 0, length: 4, audioId: null });
            renderAll();
        });
        document.getElementById('addAudioClipBtn').addEventListener('click', () => {
            if (Object.keys(audioBuffers).length === 0) {
                alert('Import an audio file first!');
                return;
            }
            const audioId = Object.keys(audioBuffers)[0];
            clips.push({ id: crypto.randomUUID(), name: `Audio Clip ${clips.length+1}`, type: 'audio', channel: selectedChannel, start: 0, length: 4, audioId });
            renderAll();
        });

        // Tabs
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                const viewId = tab.dataset.view;
                document.getElementById(viewId).classList.add('active');
            });
        });

        // Init
        rebuildChannelNodes();
        renderAll();
    })();
</script>
</body>
</html>
